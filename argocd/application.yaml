apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ml
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Kapil987/Kapil987-mlops-end-to-end2.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: ml

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data   # ignore secret values